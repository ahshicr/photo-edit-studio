services:
  - type: web
    name: photo-edit-studio
    runtime: static
    buildCommand: echo "No build required"
    staticPublishPath: .
    autoDeployTrigger: commit
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
